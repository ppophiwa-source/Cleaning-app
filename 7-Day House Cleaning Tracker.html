<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7-Day House Cleaning Tracker</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #fffdf9;
      --text: #2f3437;
      --muted: #7c858b;
      --line: #ece7de;
      --soft-green: #dff3e4;
      --soft-blue: #dfeeff;
      --soft-pink: #f8e1e8;
      --accent: #8fbca1;
      --accent-dark: #4f7f63;
      --shadow: 0 24px 70px rgba(47, 52, 55, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(223, 238, 255, 0.9), transparent 34%),
        radial-gradient(circle at bottom right, rgba(248, 225, 232, 0.8), transparent 32%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px;
    }

    .app {
      width: min(100%, 980px);
    }

    .tracker {
      background: rgba(255, 253, 249, 0.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 34px;
      padding: 34px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 30px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-dark);
      background: var(--soft-green);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2.1rem, 5vw, 4rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
      font-weight: 900;
    }

    .subtitle {
      color: var(--muted);
      max-width: 520px;
      margin-top: 14px;
      font-size: 1rem;
      line-height: 1.6;
    }

    .reset-btn {
      border: 1px solid var(--line);
      background: #ffffffb8;
      color: var(--text);
      padding: 12px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      white-space: nowrap;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      background: white;
      box-shadow: 0 12px 30px rgba(47, 52, 55, 0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: 180px repeat(7, minmax(52px, 1fr)) 210px;
      gap: 10px;
      align-items: stretch;
    }

    .top-cell {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 0 8px;
    }

    .habit-row {
      display: contents;
    }

    .habit-name,
    .cell,
    .progress-wrap {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      min-height: 62px;
    }

    .habit-name {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-radius: 18px;
      font-weight: 900;
    }

    .habit-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .habit-dot.dot-0 { background: #9ccdb0; }
    .habit-dot.dot-1 { background: #9fc5ed; }
    .habit-dot.dot-2 { background: #edb8c8; }
    .habit-dot.dot-3 { background: #dec58e; }

    .cell {
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      background: #ffffff;
      border-color: #ded7ca;
    }

    input[type="checkbox"] {
      appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 10px;
      border: 2px solid #d8d0c3;
      background: #fbfaf7;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.18s ease;
    }

    input[type="checkbox"]::after {
      content: "";
      width: 8px;
      height: 13px;
      border-right: 2px solid white;
      border-bottom: 2px solid white;
      transform: rotate(45deg) scale(0);
      margin-top: -2px;
      transition: transform 0.18s ease;
    }

    input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 8px 18px rgba(143, 188, 161, 0.35);
    }

    input[type="checkbox"]:checked::after {
      transform: rotate(45deg) scale(1);
    }

    .progress-wrap {
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-percent {
      color: var(--text);
    }

    .progress-bar {
      width: 100%;
      height: 9px;
      background: #eee9df;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #9ccdb0, #9fc5ed, #edb8c8);
      border-radius: 999px;
      transition: width 0.28s ease;
    }

    @media (max-width: 860px) {
      body {
        align-items: flex-start;
        padding: 18px;
      }

      .tracker {
        padding: 24px;
        border-radius: 28px;
      }

      .header {
        flex-direction: column;
      }

      .reset-btn {
        width: 100%;
      }

      .grid {
        display: block;
      }

      .top-cell {
        display: none;
      }

      .habit-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid var(--line);
        padding: 12px;
        border-radius: 24px;
        margin-bottom: 14px;
      }

      .habit-name,
      .progress-wrap {
        grid-column: 1 / -1;
      }

      .cell {
        min-height: 54px;
        flex-direction: column;
        gap: 5px;
      }

      .cell::before {
        content: attr(data-day);
        font-size: 0.68rem;
        font-weight: 900;
        color: var(--muted);
      }

      input[type="checkbox"] {
        width: 23px;
        height: 23px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="tracker">
      <div class="header">
        <div>
          <div class="eyebrow">Weekly reset</div>
          <h1>Cleaning<br>Tracker</h1>
          <p class="subtitle">A simple 7-day house cleaning tracker. Tick off each task as you complete it, and your progress saves automatically.</p>
        </div>
        <button class="reset-btn" id="resetBtn">Reset cleaning week</button>
      </div>

      <section class="grid" id="trackerGrid"><div class="top-cell">Area</div><div class="top-cell">Mon</div><div class="top-cell">Tue</div><div class="top-cell">Wed</div><div class="top-cell">Thu</div><div class="top-cell">Fri</div><div class="top-cell">Sat</div><div class="top-cell">Sun</div><div class="top-cell">Progress</div><div class="habit-row"><div class="habit-name"><span class="habit-dot dot-0"></span><span>Kitchen</span></div><label class="cell" data-day="Mon"><input type="checkbox" aria-label="Kitchen on Mon" checked="checked"></label><label class="cell" data-day="Tue"><input type="checkbox" aria-label="Kitchen on Tue" checked="checked"></label><label class="cell" data-day="Wed"><input type="checkbox" aria-label="Kitchen on Wed" checked="checked"></label><label class="cell" data-day="Thu"><input type="checkbox" aria-label="Kitchen on Thu" checked="checked"></label><label class="cell" data-day="Fri"><input type="checkbox" aria-label="Kitchen on Fri" checked="checked"></label><label class="cell" data-day="Sat"><input type="checkbox" aria-label="Kitchen on Sat" checked="checked"></label><label class="cell" data-day="Sun"><input type="checkbox" aria-label="Kitchen on Sun" checked="checked"></label><div class="progress-wrap">
          <div class="progress-info">
            <span>Progress</span>
            <span class="progress-percent" id="progressText-0">100%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill-0" style="width: 100%;"></div>
          </div>
        </div></div><div class="habit-row"><div class="habit-name"><span class="habit-dot dot-1"></span><span>Bathroom</span></div><label class="cell" data-day="Mon"><input type="checkbox" aria-label="Bathroom on Mon"></label><label class="cell" data-day="Tue"><input type="checkbox" aria-label="Bathroom on Tue"></label><label class="cell" data-day="Wed"><input type="checkbox" aria-label="Bathroom on Wed"></label><label class="cell" data-day="Thu"><input type="checkbox" aria-label="Bathroom on Thu"></label><label class="cell" data-day="Fri"><input type="checkbox" aria-label="Bathroom on Fri"></label><label class="cell" data-day="Sat"><input type="checkbox" aria-label="Bathroom on Sat"></label><label class="cell" data-day="Sun"><input type="checkbox" aria-label="Bathroom on Sun"></label><div class="progress-wrap">
          <div class="progress-info">
            <span>Progress</span>
            <span class="progress-percent" id="progressText-1">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill-1" style="width: 0%;"></div>
          </div>
        </div></div><div class="habit-row"><div class="habit-name"><span class="habit-dot dot-2"></span><span>Bedrooms</span></div><label class="cell" data-day="Mon"><input type="checkbox" aria-label="Bedrooms on Mon"></label><label class="cell" data-day="Tue"><input type="checkbox" aria-label="Bedrooms on Tue"></label><label class="cell" data-day="Wed"><input type="checkbox" aria-label="Bedrooms on Wed"></label><label class="cell" data-day="Thu"><input type="checkbox" aria-label="Bedrooms on Thu"></label><label class="cell" data-day="Fri"><input type="checkbox" aria-label="Bedrooms on Fri"></label><label class="cell" data-day="Sat"><input type="checkbox" aria-label="Bedrooms on Sat"></label><label class="cell" data-day="Sun"><input type="checkbox" aria-label="Bedrooms on Sun"></label><div class="progress-wrap">
          <div class="progress-info">
            <span>Progress</span>
            <span class="progress-percent" id="progressText-2">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill-2" style="width: 0%;"></div>
          </div>
        </div></div><div class="habit-row"><div class="habit-name"><span class="habit-dot dot-3"></span><span>Living Room</span></div><label class="cell" data-day="Mon"><input type="checkbox" aria-label="Living Room on Mon"></label><label class="cell" data-day="Tue"><input type="checkbox" aria-label="Living Room on Tue"></label><label class="cell" data-day="Wed"><input type="checkbox" aria-label="Living Room on Wed"></label><label class="cell" data-day="Thu"><input type="checkbox" aria-label="Living Room on Thu"></label><label class="cell" data-day="Fri"><input type="checkbox" aria-label="Living Room on Fri"></label><label class="cell" data-day="Sat"><input type="checkbox" aria-label="Living Room on Sat"></label><label class="cell" data-day="Sun"><input type="checkbox" aria-label="Living Room on Sun"></label><div class="progress-wrap">
          <div class="progress-info">
            <span>Progress</span>
            <span class="progress-percent" id="progressText-3">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill-3" style="width: 0%;"></div>
          </div>
        </div></div></section>
    </section>
  </main>

  <script>
    const habits = ["Kitchen", "Bathroom", "Bedrooms", "Living Room"];
    const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const storageKey = "sevenDayHouseCleaningTrackerData";
    const grid = document.getElementById("trackerGrid");
    const resetBtn = document.getElementById("resetBtn");

    let trackerData = JSON.parse(localStorage.getItem(storageKey)) || createEmptyData();

    function createEmptyData() {
      return habits.map(() => days.map(() => false));
    }

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(trackerData));
    }

    function getProgress(habitIndex) {
      const completed = trackerData[habitIndex].filter(Boolean).length;
      return Math.round((completed / days.length) * 100);
    }

    function createTopCell(text) {
      const cell = document.createElement("div");
      cell.className = "top-cell";
      cell.textContent = text;
      return cell;
    }

    function renderTracker() {
      grid.innerHTML = "";

      grid.appendChild(createTopCell("Area"));
      days.forEach(day => grid.appendChild(createTopCell(day)));
      grid.appendChild(createTopCell("Progress"));

      habits.forEach((habit, habitIndex) => {
        const row = document.createElement("div");
        row.className = "habit-row";

        const habitName = document.createElement("div");
        habitName.className = "habit-name";
        habitName.innerHTML = `<span class="habit-dot dot-${habitIndex}"></span><span>${habit}</span>`;
        row.appendChild(habitName);

        days.forEach((day, dayIndex) => {
          const cell = document.createElement("label");
          cell.className = "cell";
          cell.setAttribute("data-day", day);

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = trackerData[habitIndex][dayIndex];
          checkbox.setAttribute("aria-label", `${habit} on ${day}`);

          checkbox.addEventListener("change", () => {
            trackerData[habitIndex][dayIndex] = checkbox.checked;
            saveData();
            updateProgress(habitIndex);
          });

          cell.appendChild(checkbox);
          row.appendChild(cell);
        });

        const progressWrap = document.createElement("div");
        progressWrap.className = "progress-wrap";
        progressWrap.innerHTML = `
          <div class="progress-info">
            <span>Progress</span>
            <span class="progress-percent" id="progressText-${habitIndex}">${getProgress(habitIndex)}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill-${habitIndex}"></div>
          </div>
        `;

        row.appendChild(progressWrap);
        grid.appendChild(row);
      });

      habits.forEach((_, habitIndex) => updateProgress(habitIndex));
    }

    function updateProgress(habitIndex) {
      const progress = getProgress(habitIndex);
      document.getElementById(`progressText-${habitIndex}`).textContent = `${progress}%`;
      document.getElementById(`progressFill-${habitIndex}`).style.width = `${progress}%`;
    }

    resetBtn.addEventListener("click", () => {
      trackerData = createEmptyData();
      saveData();
      renderTracker();
    });

    renderTracker();
  </script>


</body></html>
